<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Express</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 40px;">

  <!-- LOGO -->
  <img src="logo.png" width="180" alt="Master Express Logo"><br><br>

  <h1>🚚 Master Express</h1>
  <p>Entrega rápida em Macaé</p>

  <!-- FORMULÁRIO SIMPLES -->
  <form id="pedidoForm">
    <input type="text" id="nome" placeholder="Nome completo" required style="width: 80%; padding: 10px; margin: 5px;"><br>
    <input type="text" id="whatsapp" placeholder="WhatsApp (com DDD)" required style="width: 80%; padding: 10px; margin: 5px;"><br>
    <input type="text" id="coleta" placeholder="Endereço de coleta" required style="width: 80%; padding: 10px; margin: 5px;"><br>
    <input type="text" id="entrega" placeholder="Endereço de entrega" required style="width: 80%; padding: 10px; margin: 5px;"><br>
    <textarea id="descricao" placeholder="Descrição do pacote" style="width: 80%; padding: 10px; margin: 5px;"></textarea><br>
    <button type="submit" style="padding: 15px 25px; background:#25D366; color:white; border:none; border-radius:8px; font-size:18px; margin-top:10px; cursor:pointer;">
      Enviar Pedido
    </button>
  </form>

  <script>
    const form = document.getElementById('pedidoForm');
    form.addEventListener('submit', function(event) {
      event.preventDefault();
      const nome = document.getElementById('nome').value;
      const whatsapp = document.getElementById('whatsapp').value;
      const coleta = document.getElementById('coleta').value;
      const entrega = document.getElementById('entrega').value;
      const descricao = document.getElementById('descricao').value;

      // Mensagem separada por linhas
      const mensagem = `📦 Novo Pedido:\n\nNome: ${nome}\nWhatsApp: ${whatsapp}\nEndereço de Coleta: ${coleta}\nEndereço de Entrega: ${entrega}\nDescrição: ${descricao}`;

      // Abrir WhatsApp
      window.open(`https://wa.me/5522992150249?text=${encodeURIComponent(mensagem)}`, '_blank');
    });
  </script>

</body>
</html>
