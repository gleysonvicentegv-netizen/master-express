<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Master Express</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#25D366">

<link rel="apple-touch-icon" href="logo.png">

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
padding:0;
text-align:center;
}

.container{
background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:10px;
margin-top:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.logo{
width:120px;
margin-bottom:10px;
}

h1{
margin:5px;
}

p{
color:#555;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

textarea{
resize:none;
}

.whatsapp{
width:100%;
background:#25D366;
color:white;
border:none;
padding:15px;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

.whatsapp:hover{
background:#1ebe5d;
}

.install{
margin-top:15px;
background:#333;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
font-size:13px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Master Express</h1>

<p>Entrega rápida no mesmo dia</p>

<input type="text" id="nome" placeholder="Seu nome" required>

<input type="text" id="telefone" placeholder="Seu telefone" required>

<input type="text" id="retirada" placeholder="Endereço de retirada" required>

<input type="text" id="entrega" placeholder="Endereço de entrega" required>

<input type="text" id="recebedor" placeholder="Nome de quem vai receber">

<input type="text" id="telrecebedor" placeholder="Telefone do recebedor">

<textarea id="descricao" placeholder="Descrição do pedido"></textarea>

<button class="whatsapp" onclick="enviarPedido()">
Enviar pedido no WhatsApp
</button>

<button class="install" id="btnInstall" style="display:none">
Baixar App
</button>

</div>

<script>

function enviarPedido(){

let nome = document.getElementById("nome").value
let telefone = document.getElementById("telefone").value
let retirada = document.getElementById("retirada").value
let entrega = document.getElementById("entrega").value
let recebedor = document.getElementById("recebedor").value
let telrecebedor = document.getElementById("telrecebedor").value
let descricao = document.getElementById("descricao").value

let mensagem = 
"📦 *NOVO PEDIDO MASTER EXPRESS*\n\n"+
"👤 Cliente: "+nome+"\n"+
"📞 Telefone: "+telefone+"\n\n"+
"📍 Retirada: "+retirada+"\n"+
"🏠 Entrega: "+entrega+"\n\n"+
"👥 Recebedor: "+recebedor+"\n"+
"📞 Tel Recebedor: "+telrecebedor+"\n\n"+
"📄 Descrição:\n"+descricao

let url = "https://wa.me/5522992150249?text="+encodeURIComponent(mensagem)

window.open(url,'_blank')

}

</script>

<script>

let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {

e.preventDefault();

deferredPrompt = e;

document.getElementById("btnInstall").style.display = "inline-block";

});

document.getElementById("btnInstall").addEventListener("click", async () => {

if(deferredPrompt){

deferredPrompt.prompt();

const choiceResult = await deferredPrompt.userChoice;

deferredPrompt = null;

}

});

</script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")

}

</script>

</body>
</html>
