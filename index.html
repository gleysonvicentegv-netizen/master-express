<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Express - Pedido de Entrega</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e53935">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(() => {
        console.log('Service Worker registrado!');
      });
    }
  </script>
  <style>
    body { font-family: Arial; background: #fff8e7; margin:0; padding:0; display:flex; flex-direction:column; align-items:center; }
    header { width:100%; background:#e53935; color:white; padding:15px 0; text-align:center; font-size:24px; font-weight:bold; }
    img.logo { width:120px; margin-top:15px; }
    main { width:95%; max-width:400px; margin:20px auto; display:flex; flex-direction:column; align-items:center; }
    input, textarea, button { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:1px solid #ccc; font-size:16px; }
    textarea { resize:none; }
    button { background:#fdd835; font-weight:bold; border:none; cursor:pointer; transition:0.3s; }
    button:hover { background:#fbc02d; }
    footer { margin:20px 0; font-size:14px; color:#555; text-align:center; }
  </style>
</head>
<body>
  <header>Master Express</header>
  <img src="master_express_logo.png" alt="Logo Master Express" class="logo">
  <main>
    <form id="pedidoForm">
      <input type="text" id="nome" placeholder="Seu nome" required>
      <input type="tel" id="telefone" placeholder="Seu WhatsApp" required>
      <input type="text" id="coleta" placeholder="Endereço de coleta" required>
      <input type="text" id="entrega" placeholder="Endereço de entrega" required>
      <textarea id="descricao" placeholder="Descrição do pacote" rows="3"></textarea>
      <button type="submit">Enviar Pedido</button>
    </form>
  </main>
  <footer>Entrega rápida de motoboy em Macaé 🚚💨</footer>
  <script>
    const form = document.getElementById('pedidoForm');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const nome = encodeURIComponent(document.getElementById('nome').value);
      const telefone = encodeURIComponent(document.getElementById('telefone').value);
      const coleta = encodeURIComponent(document.getElementById('coleta').value);
      const entrega = encodeURIComponent(document.getElementById('entrega').value);
      const descricao = encodeURIComponent(document.getElementById('descricao').value);
      const mensagem = `Olá, preciso de um entregador!\n\nNome: ${nome}\nTelefone: ${telefone}\nColeta: ${coleta}\nEntrega: ${entrega}\nDescrição: ${descricao}`;
      const whatsapp = `https://wa.me/5522992150249?text=${mensagem}`;
      window.open(whatsapp, '_blank');
    });
  </script>
</body>
</html>
