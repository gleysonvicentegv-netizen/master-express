<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Express - Solicitar Entrega</title>

<!-- Google Maps API com Places e Distance Matrix -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCJz-vLi0bfQ3_yIbGS9e_rfujh6LFgW5Q&libraries=places"></script>

<style>
body {
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background:#eaeaea;
}
.container {
    max-width:500px;
    width:90%;
    margin:40px auto;
    padding:25px;
    background:#f4f4f4;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    color:#333;
    box-sizing:border-box;
}
.container img {
    width:160px;
    display:block;
    margin:0 auto 25px auto;
}
h2 { text-align:center; font-size:28px; margin-bottom:25px; color:#25D366; }
h3 { margin-bottom:8px; }
input, select, textarea, button {
    width:100%;
    padding:14px;
    margin:6px 0;
    border-radius:12px;
    border:1px solid #ccc;
    box-sizing:border-box;
    font-size:16px;
}
textarea { resize:none; }
button {
    width:100%;
    padding:16px;
    margin-top:12px;
    background:#25D366;
    color:white;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
button:hover { background:#1ebe57; }
#valorEntrega { font-weight:bold; margin-top:10px; display:block; color:#25D366; font-size:18px; }
#avisoEndereco { color:#FF0000; font-weight:bold; margin-top:8px; display:block; }
@media (max-width: 400px) {
    h2 { font-size:24px; }
    input, select, textarea, button { padding:12px; font-size:15px; }
}
</style>
</head>
<body>

<section class="container">
    <img src="logo.png" alt="Master Express">
    <h2>🚀 Solicitar Entrega</h2>

    <form id="pedidoForm">
        <h3>👤 Dados do Solicitante</h3>
        <input type="text" id="nomeSolicitante" placeholder="Nome de quem está solicitando" required>
        <input type="text" id="telefoneSolicitante" placeholder="Telefone do solicitante" required>

        <h3>📍 Endereço de Coleta</h3>
        <input type="text" id="coleta" placeholder="Endereço completo da coleta" required>

        <h3>📦 Endereço de Entrega</h3>
        <input type="text" id="entrega" placeholder="Endereço completo da entrega" required>

        <h3>👥 Dados de Quem Vai Receber</h3>
        <input type="text" id="nomeRecebedor" placeholder="Nome de quem vai receber" required>
        <input type="text" id="telefoneRecebedor" placeholder="Telefone de quem vai receber" required>
        <input type="text" id="pontoReferencia" placeholder="Ponto de referência (ex.: próximo ao mercado)" required>

        <h3>💰 Pagamento</h3>
        <select id="pagamento" required>
            <option value="">Forma de pagamento</option>
            <option>Pix</option>
            <option>Dinheiro</option>
            <option>Cartão</option>
            <option>Empresa (Faturado)</option>
        </select>

        <h3>📝 Observações Opcionais</h3>
        <textarea id="info" placeholder="Observações adicionais (opcional)"></textarea>

        <button type="button" id="btnCalcular">Calcular Valor da Entrega</button>
        <span id="valorEntrega">Valor da entrega: R$0,00</span>
        <span id="avisoEndereco"></span>

        <button type="submit">Enviar Pedido via WhatsApp</button>
    </form>
</section>

<script>
let autocompleteColeta, autocompleteEntrega;

function initAutocomplete() {
    const coletaInput = document.getElementById('coleta');
    const entregaInput = document.getElementById('entrega');

    autocompleteColeta = new google.maps.places.Autocomplete(coletaInput, { types: ['geocode'] });
    autocompleteEntrega = new google.maps.places.Autocomplete(entregaInput, { types: ['geocode'] });

    // Limpa aviso e valor enquanto digita
    coletaInput.addEventListener('input', () => {
        document.getElementById('valorEntrega').innerText = 'Valor da entrega: R$0,00';
        document.getElementById('avisoEndereco').innerText = '';
    });
    entregaInput.addEventListener('input', () => {
        document.getElementById('valorEntrega').innerText = 'Valor da entrega: R$0,00';
        document.getElementById('avisoEndereco').innerText = '';
    });
}

// Função para calcular o valor quando o usuário clicar
function calcularValorEntrega() {
    const coletaPlace = autocompleteColeta.getPlace();
    const entregaPlace = autocompleteEntrega.getPlace();

    if (!coletaPlace || !coletaPlace.geometry || !entregaPlace || !entregaPlace.geometry) {
        document.getElementById('avisoEndereco').innerText = 'Selecione uma sugestão válida para os dois endereços!';
        document.getElementById('valorEntrega').innerText = 'Valor da entrega: R$0,00';
        return;
    }

    document.getElementById('avisoEndereco').innerText = '';

    const service = new google.maps.DistanceMatrixService();
    service.getDistanceMatrix({
        origins: [coletaPlace.formatted_address],
        destinations: [entregaPlace.formatted_address],
        travelMode: 'DRIVING',
    }, function(response, status){
        if(status === 'OK'){
            let distanciaKm = response.rows[0].elements[0].distance.value / 1000;
            let valor = 10;
            if(distanciaKm > 3) valor += (distanciaKm - 3) * 1.8;
            document.getElementById('valorEntrega').innerText = `Valor da entrega: R$${valor.toFixed(2)}`;
        } else {
            document.getElementById('avisoEndereco').innerText = 'Não foi possível calcular a distância.';
            document.getElementById('valorEntrega').innerText = 'Valor da entrega: R$0,00';
        }
    });
}

// Envio do pedido para WhatsApp
document.getElementById("pedidoForm").addEventListener("submit", function(e){
    e.preventDefault();

    let nomeSolicitante = document.getElementById("nomeSolicitante").value;
    let telefoneSolicitante = document.getElementById("telefoneSolicitante").value;
    let coleta = document.getElementById("coleta").value;
    let entrega = document.getElementById("entrega").value;
    let nomeRecebedor = document.getElementById("nomeRecebedor").value;
    let telefoneRecebedor = document.getElementById("telefoneRecebedor").value;
    let pontoReferencia = document.getElementById("pontoReferencia").value;
    let pagamento = document.getElementById("pagamento").value;
    let info = document.getElementById("info").value;
    let valor = document.getElementById("valorEntrega").innerText.replace('Valor da entrega: R$', '');

    let mensagem = 
`🚀 *NOVO PEDIDO - MASTER EXPRESS*

👤 *Solicitante:* ${nomeSolicitante}
📞 *Telefone:* ${telefoneSolicitante}

📍 *Coleta:* ${coleta}
📦 *Entrega:* ${entrega}

👥 *Recebedor:* ${nomeRecebedor}
📞 *Telefone do Recebedor:* ${telefoneRecebedor}
📌 *Ponto de Referência:* ${pontoReferencia}

💰 *Pagamento:* ${pagamento}
💵 *Valor da Entrega:* R$${valor}

📝 *Observações:* ${info ? info : "Não informado"}
`;

    let url = "https://wa.me/5522992150249?text=" + encodeURIComponent(mensagem);
    window.open(url, "_blank");
});

document.getElementById("btnCalcular").addEventListener("click", calcularValorEntrega);

initAutocomplete();
</script>

</body>
</html>
